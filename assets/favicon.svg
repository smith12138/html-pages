<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#g1)"/>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Document with folded corner -->
  <g filter="url(#shadow)">
    <path d="M36 22 L82 22 L98 40 L98 106 L36 106 Z" fill="url(#g2)" stroke="white" stroke-opacity="0.3" stroke-width="0.5"/>
    <path d="M82 22 L82 40 L98 40 Z" fill="#c7d2fe" opacity="0.7"/>
  </g>

  <!-- Content lines -->
  <rect x="48" y="52" width="38" height="4" rx="2" fill="#6366f1" opacity="0.7"/>
  <rect x="48" y="64" width="32" height="4" rx="2" fill="#6366f1" opacity="0.5"/>
  <rect x="48" y="76" width="36" height="4" rx="2" fill="#6366f1" opacity="0.35"/>
  <rect x="48" y="88" width="28" height="4" rx="2" fill="#6366f1" opacity="0.2"/>

  <!-- Left accent bar -->
  <rect x="42" y="50" width="3" height="44" rx="1.5" fill="#6366f1" opacity="0.6"/>
</svg>
