<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #ffffff; color: #111827; line-height: 1.6; min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            padding: 64px 24px 56px;
            text-align: center;
            border-bottom: 1px solid #f3f4f6;
        }
        .header h1 {
            font-size: 36px; font-weight: 800; color: #111827;
            letter-spacing: -1px;
        }
        .header h1 span { color: #6366f1; }
        .header-stats {
            display: inline-flex; gap: 32px; margin-top: 20px;
            padding: 12px 28px; background: #f9fafb; border-radius: 100px;
            border: 1px solid #f3f4f6;
        }
        .header-stat { font-size: 14px; color: #6b7280; }
        .header-stat strong { color: #111827; font-weight: 700; font-size: 18px; margin-right: 4px; }

        /* ── Main ── */
        .main { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }

        /* ── View bar ── */
        .view-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .view-title { font-size: 14px; font-weight: 500; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; }
        .search-box {
            padding: 10px 16px; border: 1.5px solid #e5e7eb; border-radius: 12px;
            font-size: 14px; width: 200px; outline: none; transition: all .2s;
            background: #fafafa; color: #111827;
        }
        .search-box:focus { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 4px rgba(99,102,241,0.06); }
        .search-box::placeholder { color: #9ca3af; }

        /* ── Project list ── */
        .project-list { display: flex; flex-direction: column; gap: 16px; }
        .project-card {
            display: flex; align-items: center; gap: 20px;
            padding: 24px 28px; background: #fff; border: 1.5px solid #f3f4f6;
            border-radius: 16px; cursor: pointer; transition: all .2s;
        }
        .project-card:hover { border-color: #6366f1; box-shadow: 0 4px 20px rgba(99,102,241,0.08); transform: translateX(4px); }
        .project-icon {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .project-icon svg { width: 22px; height: 22px; }
        .project-info { flex: 1; min-width: 0; }
        .project-name { font-size: 17px; font-weight: 700; color: #111827; margin-bottom: 2px; }
        .project-desc { font-size: 13px; color: #6b7280; }
        .project-meta { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        .project-count {
            font-size: 13px; color: #6b7280; background: #f3f4f6;
            padding: 4px 12px; border-radius: 8px; font-weight: 500;
        }
        .project-arrow { color: #d1d5db; transition: color .2s; }
        .project-card:hover .project-arrow { color: #6366f1; }

        /* ── Detail view ── */
        .detail-view { display: none; }
        .detail-view.active { display: block; }
        .detail-header {
            display: flex; align-items: center; gap: 14px; margin-bottom: 32px;
            padding-bottom: 20px; border-bottom: 1px solid #f3f4f6;
        }
        .back-btn {
            width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid #e5e7eb;
            background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .2s; color: #6b7280;
        }
        .back-btn:hover { border-color: #6366f1; color: #6366f1; }
        .detail-name { font-size: 22px; font-weight: 700; color: #111827; }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-btn {
            padding: 7px 18px; border-radius: 10px; border: 1.5px solid #e5e7eb;
            background: #fff; font-size: 13px; color: #6b7280; cursor: pointer;
            font-weight: 500; transition: all .2s;
        }
        .filter-btn:hover { border-color: #6366f1; color: #6366f1; }
        .filter-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }

        .category-section { margin-bottom: 32px; }
        .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .category-dot { width: 8px; height: 8px; border-radius: 50%; }
        .category-title { font-size: 13px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
        .category-count { font-size: 11px; color: #9ca3af; }

        .card-list { display: flex; flex-direction: column; gap: 10px; }
        .card {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 20px; background: #fff; border: 1.5px solid #f3f4f6;
            border-radius: 12px; text-decoration: none; color: inherit; transition: all .2s;
        }
        .card:hover { border-color: #6366f1; box-shadow: 0 2px 12px rgba(99,102,241,0.06); }
        .card-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .card-body { flex: 1; min-width: 0; }
        .card-title { font-size: 14px; font-weight: 500; color: #111827; }
        .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
        .card-date { font-size: 12px; color: #9ca3af; }
        .card-tags { display: flex; gap: 5px; }
        .tag { font-size: 11px; padding: 1px 8px; border-radius: 4px; font-weight: 500; }
        .card-go { color: #d1d5db; flex-shrink: 0; transition: color .2s; }
        .card:hover .card-go { color: #6366f1; }

        /* ── Footer ── */
        .footer { text-align: center; font-size: 12px; color: #d1d5db; padding: 24px; }

        .empty { text-align: center; padding: 48px; color: #9ca3af; font-size: 14px; }

        @media (max-width: 640px) {
            .header { padding: 40px 16px 36px; }
            .header h1 { font-size: 28px; }
            .main { padding: 32px 16px 60px; }
            .project-card { padding: 18px 20px; gap: 14px; }
            .project-meta { display: none; }
            .search-box { width: 140px; }
            .header-stats { gap: 20px; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Docs <span>Hub</span></h1>
        <div class="header-stats">
            <div class="header-stat"><strong id="projCount">0</strong>项目</div>
            <div class="header-stat"><strong id="totalCount">0</strong>文档</div>
        </div>
    </div>

    <div class="main">
        <div id="projectsView">
            <div class="view-bar">
                <span class="view-title">Projects</span>
                <input class="search-box" id="searchBox" placeholder="搜索..." />
            </div>
            <div class="project-list" id="projectGrid"></div>
        </div>

        <div class="detail-view" id="detailView">
            <div class="detail-header">
                <button class="back-btn" onclick="showProjects()" title="返回">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="detail-name" id="detailName"></span>
            </div>
            <div class="filter-bar" id="filterBar"></div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div class="footer">Docs Hub</div>

    <script>
        const DATA = {"categories":[{"id":"requirement","name":"需求文档","icon":"doc","color":"#ff7d00","bg":"#fff7e8"},{"id":"flow","name":"流程文档","icon":"flow","color":"#0fc6c2","bg":"#e8fffb"},{"id":"feedback","name":"反馈汇总","icon":"feedback","color":"#722ed1","bg":"#f3e8ff"}],"projects":[{"id":"ai-cs","name":"AI客服","description":"智能客服系统相关文档","color":"#6366f1","pages":[{"file":"docs/AI客服/AI客服问题汇总报告_20260516.html","title":"AI客服问题汇总报告","category":"feedback","date":"2026-05-16","tags":["AI客服","问题汇总"]},{"file":"docs/AI客服/智能客服SOP流程.html","title":"智能客服SOP流程","category":"requirement","date":"2026-05-22","tags":["智能客服","SOP"]}]}]};

        const PROJ_ICON = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
        const ARROW = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

        function encodePath(p) { return p.split('/').map(s => encodeURIComponent(s)).join('/'); }
        function getCat(id) { return DATA.categories.find(c => c.id === id) || { name: id, color: '#999', bg: '#f5f5f5' }; }

        let activeProject = null;
        let activeFilter = 'all';

        function updateStats() {
            const total = DATA.projects.reduce((s, p) => s + p.pages.length, 0);
            document.getElementById('projCount').textContent = DATA.projects.length;
            document.getElementById('totalCount').textContent = total;
        }

        function renderProjects(filter) {
            const grid = document.getElementById('projectGrid');
            let projects = DATA.projects;
            if (filter) {
                const q = filter.toLowerCase();
                projects = projects.filter(p =>
                    p.name.toLowerCase().includes(q) ||
                    p.description.toLowerCase().includes(q) ||
                    p.pages.some(pg => pg.title.toLowerCase().includes(q))
                );
            }
            grid.innerHTML = projects.map(proj => {
                return `
                    <div class="project-card" onclick="showDetail('${proj.id}')">
                        <div class="project-icon" style="background:${proj.color}">${PROJ_ICON}</div>
                        <div class="project-info">
                            <div class="project-name">${proj.name}</div>
                            <div class="project-desc">${proj.description}</div>
                        </div>
                        <div class="project-meta">
                            <span class="project-count">${proj.pages.length} 篇</span>
                        </div>
                        <div class="project-arrow">${ARROW}</div>
                    </div>
                `;
            }).join('');
            if (!grid.innerHTML.trim()) grid.innerHTML = '<div class="empty">未找到匹配的项目</div>';
        }

        function showProjects() {
            activeProject = null;
            activeFilter = 'all';
            document.getElementById('projectsView').style.display = '';
            document.getElementById('detailView').classList.remove('active');
            history.pushState(null, '', location.pathname);
            renderProjects(document.getElementById('searchBox').value);
        }

        function showDetail(projId) {
            const proj = DATA.projects.find(p => p.id === projId);
            if (!proj) return;
            activeProject = proj;
            activeFilter = 'all';
            document.getElementById('projectsView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
            document.getElementById('detailName').textContent = proj.name;
            history.pushState(null, '', `?project=${projId}`);
            renderDetail();
        }

        function renderDetail() {
            if (!activeProject) return;
            const pages = activeProject.pages;
            const catIds = [...new Set(pages.map(p => p.category))];

            const bar = document.getElementById('filterBar');
            bar.innerHTML = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" data-f="all">全部</button>` +
                catIds.map(id => {
                    const c = getCat(id);
                    return `<button class="filter-btn ${activeFilter === id ? 'active' : ''}" data-f="${id}">${c.name}</button>`;
                }).join('');
            bar.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => { activeFilter = btn.dataset.f; renderDetail(); });
            });

            const el = document.getElementById('detailContent');
            const visCats = activeFilter === 'all' ? catIds : [activeFilter];
            el.innerHTML = visCats.map(catId => {
                const c = getCat(catId);
                const catPages = pages.filter(p => p.category === catId);
                if (!catPages.length) return '';
                return `
                    <div class="category-section">
                        <div class="category-header">
                            <div class="category-dot" style="background:${c.color}"></div>
                            <span class="category-title">${c.name}</span>
                            <span class="category-count">${catPages.length}</span>
                        </div>
                        <div class="card-list">
                            ${catPages.map(p => {
                                const c2 = getCat(p.category);
                                return `
                                <a class="card" href="${encodePath(p.file)}">
                                    <div class="card-dot" style="background:${c2.color}"></div>
                                    <div class="card-body">
                                        <div class="card-title">${p.title}</div>
                                        <div class="card-meta">
                                            <span class="card-date">${p.date}</span>
                                            <div class="card-tags">${(p.tags||[]).map(t=>`<span class="tag" style="background:${c2.bg};color:${c2.color}">${t}</span>`).join('')}</div>
                                        </div>
                                    </div>
                                    <div class="card-go">${ARROW}</div>
                                </a>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            if (!el.innerHTML.trim()) el.innerHTML = '<div class="empty">暂无文档</div>';
        }

        updateStats();
        const params = new URLSearchParams(location.search);
        const initProj = params.get('project');
        if (initProj && DATA.projects.find(p => p.id === initProj)) {
            showDetail(initProj);
        } else {
            renderProjects();
        }

        document.getElementById('searchBox').addEventListener('input', e => renderProjects(e.target.value));
        window.addEventListener('popstate', () => {
            const p = new URLSearchParams(location.search).get('project');
            if (p) showDetail(p); else showProjects();
        });
    </script>
</body>
</html>
