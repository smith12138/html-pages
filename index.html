<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f7f8fa; color: #1f2937; line-height: 1.6; min-height: 100vh;
        }

        /* ── Layout ── */
        .page { display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 24px; width: 100%; }

        /* ── Top Bar ── */
        .topbar {
            padding: 16px 0; display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-logo {
            font-size: 16px; font-weight: 700; color: #1f2937;
            display: flex; align-items: center; gap: 6px;
        }
        .topbar-logo span { color: #6366f1; }
        .topbar-clock { font-size: 13px; color: #9ca3af; font-variant-numeric: tabular-nums; }
        .topbar-greeting { font-size: 13px; color: #6b7280; }

        /* ── Hero ── */
        .hero {
            padding: 48px 0 40px; display: flex; align-items: flex-start; justify-content: space-between; gap: 32px;
        }
        .hero-left { flex: 1; }
        .hero-greeting { font-size: 26px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
        .hero-greeting span { color: #6366f1; }
        .hero-quote { font-size: 14px; color: #9ca3af; font-style: italic; line-height: 1.6; max-width: 420px; }
        .hero-quote .author { font-style: normal; opacity: 0.7; }
        .hero-right {
            display: flex; gap: 12px;
        }
        .stat-card {
            background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
            padding: 18px 22px; min-width: 100px; text-align: center;
        }
        .stat-card .num { font-size: 28px; font-weight: 800; color: #6366f1; }
        .stat-card .label { font-size: 12px; color: #9ca3af; margin-top: 2px; }

        /* ── Content Grid ── */
        .content { padding-bottom: 60px; flex: 1; }
        .grid { display: grid; grid-template-columns: 1fr 280px; gap: 24px; }

        /* ── Projects (left) ── */
        .section-title {
            font-size: 12px; font-weight: 600; color: #9ca3af;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
        }
        .project-list { display: flex; flex-direction: column; gap: 12px; }
        .project-card {
            display: flex; align-items: center; gap: 16px;
            padding: 20px 22px; background: #fff; border: 1px solid #e5e7eb;
            border-radius: 14px; cursor: pointer; transition: all .2s;
        }
        .project-card:hover { border-color: #6366f1; box-shadow: 0 4px 16px rgba(99,102,241,0.08); transform: translateY(-2px); }
        .project-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .project-icon svg { width: 20px; height: 20px; }
        .project-info { flex: 1; min-width: 0; }
        .project-name { font-size: 15px; font-weight: 600; color: #1f2937; }
        .project-desc { font-size: 12px; color: #6b7280; margin-top: 2px; }
        .project-badge { font-size: 12px; color: #6366f1; background: #eef2ff; padding: 4px 10px; border-radius: 8px; font-weight: 600; flex-shrink: 0; }

        /* ── Timeline (right sidebar) ── */
        .sidebar {}
        .timeline { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 20px; }
        .timeline-list { list-style: none; position: relative; padding-left: 20px; }
        .timeline-list::before {
            content: ''; position: absolute; left: 5px; top: 6px; bottom: 6px;
            width: 2px; background: #eef2ff; border-radius: 2px;
        }
        .timeline-item { position: relative; padding-bottom: 16px; border-radius: 6px; transition: background .15s; cursor: pointer; }
        .timeline-item:hover { background: #f9fafb; }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-item::before {
            content: ''; position: absolute; left: -18px; top: 6px;
            width: 8px; height: 8px; border-radius: 50%;
            background: #6366f1;
        }
        .tl-title { font-size: 13px; font-weight: 500; color: #1f2937; line-height: 1.3; }
        .tl-meta { font-size: 11px; color: #9ca3af; margin-top: 3px; }

        /* ── Detail view ── */
        .detail-view { display: none; }
        .detail-view.active { display: block; }
        .detail-header {
            display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
            padding-bottom: 16px; border-bottom: 1px solid #e5e7eb;
        }
        .back-btn {
            width: 34px; height: 34px; border-radius: 10px; border: 1px solid #e5e7eb;
            background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .15s; color: #6b7280;
        }
        .back-btn:hover { border-color: #6366f1; color: #6366f1; }
        .detail-name { font-size: 20px; font-weight: 700; color: #1f2937; }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn {
            padding: 6px 16px; border-radius: 10px; border: 1px solid #e5e7eb;
            background: #fff; font-size: 13px; color: #6b7280; cursor: pointer;
            font-weight: 500; transition: all .15s;
        }
        .filter-btn:hover { border-color: #6366f1; color: #6366f1; }
        .filter-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }

        .category-section { margin-bottom: 28px; }
        .category-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .category-dot { width: 8px; height: 8px; border-radius: 50%; }
        .category-title { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }

        .card-list { display: flex; flex-direction: column; gap: 8px; }
        .card {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 18px; background: #fff; border: 1px solid #e5e7eb;
            border-radius: 12px; text-decoration: none; color: inherit; transition: all .15s;
        }
        .card:hover { border-color: #6366f1; box-shadow: 0 2px 8px rgba(99,102,241,0.06); }
        .card-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .card-body { flex: 1; min-width: 0; }
        .card-title { font-size: 14px; font-weight: 500; color: #1f2937; }
        .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
        .card-date { font-size: 12px; color: #9ca3af; }
        .tag { font-size: 11px; padding: 1px 7px; border-radius: 4px; font-weight: 500; }
        .card-arrow { color: #d1d5db; flex-shrink: 0; transition: color .15s; }
        .card:hover .card-arrow { color: #6366f1; }

        /* ── Footer ── */
        .footer { text-align: center; font-size: 12px; color: #d1d5db; padding: 20px; }

        .empty { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }
        .search-box {
            padding: 8px 14px; border: 1px solid #e5e7eb; border-radius: 10px;
            font-size: 13px; width: 180px; outline: none; transition: all .2s;
            background: #fff; color: #1f2937;
        }
        .search-box:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.06); }
        .search-box::placeholder { color: #9ca3af; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .hero { flex-direction: column; padding: 32px 0 28px; }
            .hero-right { align-self: flex-start; }
            .sidebar { order: -1; }
            .topbar-clock { display: none; }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="container">
        <div class="topbar">
            <div class="topbar-left">
                <div class="topbar-logo">Docs <span>Hub</span></div>
            </div>
            <div class="topbar-clock" id="clock"></div>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <div class="hero-left">
                <div class="hero-greeting" id="heroGreeting"></div>
                <div class="hero-quote" id="heroQuote"></div>
            </div>
            <div class="hero-right">
                <div class="stat-card"><div class="num" id="projCount">0</div><div class="label">项目</div></div>
                <div class="stat-card"><div class="num" id="totalCount">0</div><div class="label">文档</div></div>
            </div>
        </div>
    </div>

    <div class="container content">
        <div id="projectsView">
            <div class="grid">
                <div class="projects-col">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
                        <div class="section-title">Projects</div>
                        <input class="search-box" id="searchBox" placeholder="搜索..." />
                    </div>
                    <div class="project-list" id="projectGrid"></div>
                </div>
                <div class="sidebar">
                    <div class="section-title">最近更新</div>
                    <div class="timeline" id="timeline"></div>
                </div>
            </div>
        </div>

        <div class="detail-view" id="detailView">
            <div class="detail-header">
                <button class="back-btn" onclick="showProjects()" title="返回">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="detail-name" id="detailName"></span>
            </div>
            <div class="filter-bar" id="filterBar"></div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div class="footer">Docs Hub</div>
</div>

<script>
    const DATA = {"categories":[{"id":"requirement","name":"需求文档","icon":"doc","color":"#ff7d00","bg":"#fff7e8"},{"id":"flow","name":"流程文档","icon":"flow","color":"#0fc6c2","bg":"#e8fffb"},{"id":"feedback","name":"反馈汇总","icon":"feedback","color":"#722ed1","bg":"#f3e8ff"},{"id":"testcase","name":"测试用例","icon":"testcase","color":"#059669","bg":"#ecfdf5"}],"projects":[{"id":"ai-cs","name":"AI客服","description":"智能客服系统相关文档","color":"#6366f1","pages":[{"file":"docs/AI客服/AI客服问题汇总报告_20260516.html","title":"AI客服问题汇总报告","category":"feedback","date":"2026-05-16","tags":["AI客服","问题汇总"]},{"file":"docs/AI客服/智能客服SOP流程.html","title":"智能客服SOP流程","category":"requirement","date":"2026-05-22","tags":["智能客服","SOP"]},{"file":"docs/AI客服/AI客服系统测试用例.html","title":"AI客服系统测试用例","category":"testcase","date":"2026-05-22","tags":[]}]},{"id":"risk","name":"风控系统","description":"风控系统相关文档","color":"#ef4444","pages":[]},{"id":"piscipient","name":"双鱼座AI投放","description":"AI广告投放管理平台","color":"#d4a017","pages":[{"file":"docs/双鱼座AI投放/双鱼座AI投放项目文档.html","title":"双鱼座AI投放项目文档","category":"requirement","date":"2026-05-22","tags":[]}]},{"id":"kunlun","name":"昆仑幻视","description":"AI视频与图像生成平台","color":"#0d7377","pages":[{"file":"docs/昆仑幻视/昆仑幻视项目文档.html","title":"昆仑幻视项目文档","category":"requirement","date":"2026-05-22","tags":[]}]}]};

    const PROJ_ICON = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
    const ARROW = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

    function encodePath(p) { return p.split('/').map(s => encodeURIComponent(s)).join('/'); }
    function getCat(id) { return DATA.categories.find(c => c.id === id) || { name: id, color: '#999', bg: '#f5f5f5' }; }

    let activeProject = null;
    let activeFilter = 'all';

    // ── Clock ──
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
    }
    updateClock(); setInterval(updateClock, 1000);

    // ── Greeting ──
    (function() {
        const h = new Date().getHours();
        const greet = h < 6 ? '夜深了，注意休息' : h < 12 ? '早上好' : h < 14 ? '中午好' : h < 18 ? '下午好' : '晚上好';
        document.getElementById('heroGreeting').innerHTML = `${greet}，欢迎回来 <span>.</span>`;
    })();

    // ── Quote ──
    (function() {
        const quotes = [
            ['好的文档是送给未来自己的礼物', ''],
            ['把复杂的事情简单化，是最高级的能力', ''],
            ['文档不是终点，是协作的起点', ''],
            ['Done is better than perfect.', 'Sheryl Sandberg'],
            ['Simplicity is the ultimate sophistication.', 'Da Vinci'],
            ['清晰的流程胜过一千次口头沟通', ''],
            ['Write it down. Make it clear. Move on.', ''],
            ['把事情做对，比把事情做完更重要', ''],
        ];
        const q = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('heroQuote').innerHTML = `"${q[0]}"${q[1] ? ` <span class="author">— ${q[1]}</span>` : ''}`;
    })();

    // ── Stats ──
    function updateStats() {
        const total = DATA.projects.reduce((s, p) => s + p.pages.length, 0);
        document.getElementById('projCount').textContent = DATA.projects.length;
        document.getElementById('totalCount').textContent = total;
    }

    // ── Timeline ──
    function renderTimeline() {
        const allPages = DATA.projects.flatMap(proj => proj.pages.map(p => ({ ...p, project: proj.name })));
        const sorted = allPages.sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);
        const el = document.getElementById('timeline');
        if (!sorted.length) { el.parentElement.style.display = 'none'; return; }
        el.innerHTML = `<ul class="timeline-list">${sorted.map(p => {
            const c = getCat(p.category);
            return `<li class="timeline-item"><a href="${encodePath(p.file)}" style="text-decoration:none;color:inherit;display:block"><div class="tl-title">${p.title}</div><div class="tl-meta">${p.date} · ${p.project} · ${c.name}</div></a></li>`;
        }).join('')}</ul>`;
    }

    // ── Projects ──
    function renderProjects(filter) {
        const grid = document.getElementById('projectGrid');
        let projects = DATA.projects;
        if (filter) {
            const q = filter.toLowerCase();
            projects = projects.filter(p =>
                p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) ||
                p.pages.some(pg => pg.title.toLowerCase().includes(q))
            );
        }
        grid.innerHTML = projects.map(proj => `
            <div class="project-card" onclick="showDetail('${proj.id}')">
                <div class="project-icon" style="background:${proj.color}">${PROJ_ICON}</div>
                <div class="project-info">
                    <div class="project-name">${proj.name}</div>
                    <div class="project-desc">${proj.description}</div>
                </div>
                <div class="project-badge">${proj.pages.length} 篇</div>
            </div>
        `).join('') || '<div class="empty">未找到匹配的项目</div>';
    }

    function showProjects() {
        activeProject = null; activeFilter = 'all';
        document.getElementById('projectsView').style.display = '';
        document.getElementById('detailView').classList.remove('active');
        history.pushState(null, '', location.pathname);
        renderProjects(document.getElementById('searchBox').value);
    }

    function showDetail(projId) {
        const proj = DATA.projects.find(p => p.id === projId);
        if (!proj) return;
        activeProject = proj; activeFilter = 'all';
        document.getElementById('projectsView').style.display = 'none';
        document.getElementById('detailView').classList.add('active');
        document.getElementById('detailName').textContent = proj.name;
        history.pushState(null, '', `?project=${projId}`);
        renderDetail();
    }

    function renderDetail() {
        if (!activeProject) return;
        const pages = activeProject.pages;
        const catIds = [...new Set(pages.map(p => p.category))];

        const bar = document.getElementById('filterBar');
        bar.innerHTML = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" data-f="all">全部</button>` +
            catIds.map(id => { const c = getCat(id); return `<button class="filter-btn ${activeFilter === id ? 'active' : ''}" data-f="${id}">${c.name}</button>`; }).join('');
        bar.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { activeFilter = btn.dataset.f; renderDetail(); }));

        const el = document.getElementById('detailContent');
        const visCats = activeFilter === 'all' ? catIds : [activeFilter];
        el.innerHTML = visCats.map(catId => {
            const c = getCat(catId);
            const catPages = pages.filter(p => p.category === catId);
            if (!catPages.length) return '';
            return `
                <div class="category-section">
                    <div class="category-header"><div class="category-dot" style="background:${c.color}"></div><span class="category-title">${c.name}</span></div>
                    <div class="card-list">${catPages.map(p => `
                        <a class="card" href="${encodePath(p.file)}">
                            <div class="card-dot" style="background:${c.color}"></div>
                            <div class="card-body">
                                <div class="card-title">${p.title}</div>
                                <div class="card-meta"><span class="card-date">${p.date}</span>${(p.tags||[]).map(t=>`<span class="tag" style="background:${c.bg};color:${c.color}">${t}</span>`).join('')}</div>
                            </div>
                            <div class="card-arrow">${ARROW}</div>
                        </a>`).join('')}
                    </div>
                </div>`;
        }).join('') || '<div class="empty">暂无文档</div>';
    }

    // ── Init ──
    updateStats();
    renderTimeline();
    const params = new URLSearchParams(location.search);
    const initProj = params.get('project');
    if (initProj && DATA.projects.find(p => p.id === initProj)) { showDetail(initProj); }
    else { renderProjects(); }

    document.getElementById('searchBox').addEventListener('input', e => renderProjects(e.target.value));
    window.addEventListener('popstate', () => { const p = new URLSearchParams(location.search).get('project'); if (p) showDetail(p); else showProjects(); });
</script>
</body>
</html>
