<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs Hub</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --border: #e8e8e8;
            --text: #1d2129;
            --text-secondary: #5a6270;
            --primary: #6366f1;
            --tag-bg: #f2f3f5;
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.1);
            --header-bg: linear-gradient(135deg, #1d2129 0%, #2d3748 100%);
            --footer-bg: #fafbfc;
            --footer-text: #4e5969;
            --search-bg: #ffffff;
            --proj-bottom-bg: #fafbfc;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #17171a;
                --card: #242428;
                --border: #35353a;
                --text: #e8e8eb;
                --text-secondary: #a0a0ab;
                --primary: #818cf8;
                --tag-bg: #2e2e35;
                --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
                --header-bg: linear-gradient(135deg, #0f0f12 0%, #1a1a2e 100%);
                --footer-bg: #1c1c20;
                --footer-text: #b0b0ba;
                --search-bg: #2a2a30;
                --proj-bottom-bg: #1e1e22;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
        }

        /* Header */
        .header { background: var(--header-bg); color: #fff; padding: 48px 24px 40px; }
        .header-inner { max-width: 1060px; margin: 0 auto; }
        .header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
        .header-sub { margin-top: 8px; font-size: 14px; color: rgba(255,255,255,0.6); }
        .stats { display: flex; gap: 28px; margin-top: 20px; }
        .stat { display: flex; align-items: baseline; gap: 6px; }
        .stat-num { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 13px; color: rgba(255,255,255,0.5); }

        /* Main */
        .main { max-width: 1060px; margin: -24px auto 0; padding: 0 24px 60px; position: relative; z-index: 1; }

        /* View toggle */
        .view-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .view-title { font-size: 16px; font-weight: 600; color: var(--text); }
        .search-box { padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; width: 220px; outline: none; transition: border-color .2s; background: var(--search-bg); color: var(--text); }
        .search-box:focus { border-color: var(--primary); }

        /* Project grid */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .project-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 14px;
            overflow: hidden; transition: all .25s; cursor: pointer;
        }
        .project-card:hover { box-shadow: var(--shadow-hover); border-color: transparent; transform: translateY(-3px); }
        .project-top { padding: 22px 24px 16px; }
        .project-color { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
        .project-color svg { width: 20px; height: 20px; }
        .project-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .project-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
        .project-stats { display: flex; gap: 16px; }
        .project-stat { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
        .project-stat strong { color: var(--text); font-size: 14px; }
        .project-bottom { padding: 12px 24px; background: var(--proj-bottom-bg); border-top: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
        .cat-chip { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 500; }

        /* Project detail view (hidden by default) */
        .detail-view { display: none; }
        .detail-view.active { display: block; }
        .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .back-btn {
            width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .2s;
        }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); }
        .detail-name { font-size: 20px; font-weight: 600; }
        .detail-desc { font-size: 13px; color: var(--text-secondary); margin-left: auto; }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn {
            padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--card); font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all .2s;
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

        .category-section { margin-bottom: 28px; }
        .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-left: 2px; }
        .category-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
        .category-title { font-size: 15px; font-weight: 600; }
        .category-count { font-size: 11px; color: var(--text-secondary); background: var(--tag-bg); padding: 2px 8px; border-radius: 10px; }

        .card-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 16px 18px; text-decoration: none; color: inherit; display: flex;
            flex-direction: column; gap: 8px; transition: all .2s; position: relative; overflow: hidden;
        }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 3px 0 0 3px; }
        .card:hover { box-shadow: var(--shadow-hover); border-color: transparent; transform: translateY(-2px); }
        .card-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
        .card-meta { display: flex; align-items: center; justify-content: space-between; }
        .card-date { font-size: 12px; color: var(--text-secondary); }
        .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; }

        .footer { text-align: center; font-size: 13px; color: var(--footer-text); padding: 24px 20px; border-top: 1px solid var(--border); background: var(--footer-bg); letter-spacing: 0.3px; }
        .empty { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }

        @media (max-width: 640px) {
            .header { padding: 32px 16px 28px; }
            .main { padding: 0 16px 40px; }
            .project-grid { grid-template-columns: 1fr; }
            .card-list { grid-template-columns: 1fr; }
            .detail-desc { display: none; }
            .search-box { width: 150px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>Docs Hub</h1>
            <p class="header-sub">GitHub Pages &middot; smith12138/html-pages</p>
            <div class="stats">
                <div class="stat"><span class="stat-num" id="projCount">0</span><span class="stat-label">个项目</span></div>
                <div class="stat"><span class="stat-num" id="totalCount">0</span><span class="stat-label">篇文档</span></div>
            </div>
        </div>
    </div>

    <div class="main">
        <!-- Projects overview -->
        <div id="projectsView">
            <div class="view-bar">
                <span class="view-title">所有项目</span>
                <input class="search-box" id="searchBox" placeholder="搜索项目或文档..." />
            </div>
            <div class="project-grid" id="projectGrid"></div>
        </div>

        <!-- Project detail -->
        <div class="detail-view" id="detailView">
            <div class="detail-header">
                <button class="back-btn" onclick="showProjects()" title="返回项目列表">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="detail-name" id="detailName"></span>
                <span class="detail-desc" id="detailDesc"></span>
            </div>
            <div class="filter-bar" id="filterBar"></div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div class="footer">Docs Hub &middot; Powered by GitHub Pages &middot; Auto-published</div>

    <script>
        const DATA = {"categories":[{"id":"requirement","name":"需求文档","icon":"doc","color":"#ff7d00","bg":"#fff7e8"},{"id":"flow","name":"流程文档","icon":"flow","color":"#0fc6c2","bg":"#e8fffb"},{"id":"feedback","name":"反馈汇总","icon":"feedback","color":"#722ed1","bg":"#f3e8ff"}],"projects":[{"id":"ai-cs","name":"AI客服","description":"智能客服系统相关文档","color":"#6366f1","pages":[{"file":"docs/AI客服/AI客服问题汇总报告_20260516.html","title":"AI客服问题汇总报告","category":"feedback","date":"2026-05-16","tags":["AI客服","问题汇总"]},{"file":"docs/AI客服/智能客服SOP流程.html","title":"智能客服SOP流程","category":"requirement","date":"2026-05-22","tags":["智能客服","SOP"]}]}]};

        const CAT_ICONS = {
            requirement: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
            flow: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
            feedback: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
        };

        const PROJ_ICON = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';

        function encodePath(p) { return p.split('/').map(s => encodeURIComponent(s)).join('/'); }
        function getCat(id) { return DATA.categories.find(c => c.id === id) || { name: id, color: '#999', bg: '#f5f5f5' }; }

        let activeProject = null;
        let activeFilter = 'all';

        // ── Stats ──
        function updateStats() {
            const total = DATA.projects.reduce((s, p) => s + p.pages.length, 0);
            document.getElementById('projCount').textContent = DATA.projects.length;
            document.getElementById('totalCount').textContent = total;
        }

        // ── Projects view ──
        function renderProjects(filter) {
            const grid = document.getElementById('projectGrid');
            let projects = DATA.projects;
            if (filter) {
                const q = filter.toLowerCase();
                projects = projects.filter(p =>
                    p.name.toLowerCase().includes(q) ||
                    p.description.toLowerCase().includes(q) ||
                    p.pages.some(pg => pg.title.toLowerCase().includes(q))
                );
            }
            grid.innerHTML = projects.map(proj => {
                const catIds = [...new Set(proj.pages.map(p => p.category))];
                const catChips = catIds.map(id => {
                    const c = getCat(id);
                    return `<span class="cat-chip" style="background:${c.bg};color:${c.color}">${c.name}</span>`;
                }).join('');
                const latest = proj.pages.reduce((a, b) => a.date > b.date ? a : b, proj.pages[0]);
                return `
                    <div class="project-card" onclick="showDetail('${proj.id}')">
                        <div class="project-top">
                            <div class="project-color" style="background:${proj.color}">${PROJ_ICON}</div>
                            <div class="project-name">${proj.name}</div>
                            <div class="project-desc">${proj.description}</div>
                            <div class="project-stats">
                                <div class="project-stat"><strong>${proj.pages.length}</strong> 篇文档</div>
                                <div class="project-stat">最近更新 <strong>${latest ? latest.date : '-'}</strong></div>
                            </div>
                        </div>
                        <div class="project-bottom">${catChips}</div>
                    </div>
                `;
            }).join('');
            if (!grid.innerHTML.trim()) grid.innerHTML = '<div class="empty">未找到匹配的项目</div>';
        }

        function showProjects() {
            activeProject = null;
            activeFilter = 'all';
            document.getElementById('projectsView').style.display = '';
            document.getElementById('detailView').classList.remove('active');
            history.pushState(null, '', location.pathname);
            renderProjects(document.getElementById('searchBox').value);
        }

        // ── Detail view ──
        function showDetail(projId) {
            const proj = DATA.projects.find(p => p.id === projId);
            if (!proj) return;
            activeProject = proj;
            activeFilter = 'all';
            document.getElementById('projectsView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
            document.getElementById('detailName').textContent = proj.name;
            document.getElementById('detailDesc').textContent = proj.description;
            history.pushState(null, '', `?project=${projId}`);
            renderDetail();
        }

        function renderDetail() {
            if (!activeProject) return;
            const pages = activeProject.pages;
            const catIds = [...new Set(pages.map(p => p.category))];

            // Filter bar
            const bar = document.getElementById('filterBar');
            bar.innerHTML = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" data-f="all">全部</button>` +
                catIds.map(id => {
                    const c = getCat(id);
                    return `<button class="filter-btn ${activeFilter === id ? 'active' : ''}" data-f="${id}">${c.name}</button>`;
                }).join('');
            bar.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => { activeFilter = btn.dataset.f; renderDetail(); });
            });

            // Content
            const el = document.getElementById('detailContent');
            const visCats = activeFilter === 'all' ? catIds : [activeFilter];
            el.innerHTML = visCats.map(catId => {
                const c = getCat(catId);
                const catPages = pages.filter(p => p.category === catId);
                if (!catPages.length) return '';
                return `
                    <div class="category-section">
                        <div class="category-header">
                            <div class="category-icon" style="background:${c.bg};color:${c.color}">${CAT_ICONS[catId] || ''}</div>
                            <span class="category-title">${c.name}</span>
                            <span class="category-count">${catPages.length}</span>
                        </div>
                        <div class="card-list">
                            ${catPages.map(p => `
                                <a class="card" href="${encodePath(p.file)}" style="--c:${c.color};--cbg:${c.bg}">
                                    <style>.card[style*="${c.color}"]::before{background:${c.color}} .card[style*="${c.color}"] .tag{background:${c.bg};color:${c.color}}</style>
                                    <div class="card-title">${p.title}</div>
                                    <div class="card-meta">
                                        <span class="card-date">${p.date}</span>
                                        <div class="card-tags">${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            if (!el.innerHTML.trim()) el.innerHTML = '<div class="empty">暂无文档</div>';
        }

        // ── Init ──
        updateStats();
        const params = new URLSearchParams(location.search);
        const initProj = params.get('project');
        if (initProj && DATA.projects.find(p => p.id === initProj)) {
            showDetail(initProj);
        } else {
            renderProjects();
        }

        document.getElementById('searchBox').addEventListener('input', e => renderProjects(e.target.value));
        window.addEventListener('popstate', () => {
            const p = new URLSearchParams(location.search).get('project');
            if (p) showDetail(p); else showProjects();
        });
    </script>
</body>
</html>
