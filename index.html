<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Pages</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 24px; color: #1a1a1a; }
        .file-list { list-style: none; }
        .file-list li { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 12px; transition: box-shadow 0.2s; }
        .file-list li:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .file-list a { display: block; padding: 16px 20px; text-decoration: none; color: #0366d6; font-size: 16px; }
        .file-list a:hover { color: #0250a3; }
        .meta { font-size: 12px; color: #888; margin-top: 4px; }
        .footer { margin-top: 40px; font-size: 13px; color: #999; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HTML Pages</h1>
        <ul class="file-list" id="fileList"></ul>
        <div class="footer">Hosted on GitHub Pages &middot; Auto-published</div>
    </div>
    <script>
        // Auto-generate file list from known pages
        const pages = [
            { name: 'AI客服问题汇总报告_20260516', file: 'AI客服问题汇总报告_20260516.html' },
            { name: '常规客服接待SOP流程', file: '常规客服接待SOP流程.html' },
        ];
        const list = document.getElementById('fileList');
        pages.forEach(p => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${encodeURIComponent(p.file)}">${p.name}</a>`;
            list.appendChild(li);
        });
    </script>
</body>
</html>
